<section class="courses-page">
    <div class="courses-page__breadcrumbs">
        <img class="courses-page__breadcrumbs-icon" src="/assets/images/home.svg" alt="icon">
        <span>Курсы</span>
    </div>
    <div class="courses-toolbar">
        <div class="courses-toolbar__search">
            <input 
                type="text" 
                placeholder="Поиск"
                [(ngModel)]="searchTerm"
                class="search-input"
            >
            <button 
                (click)="onSearch()"
                class="search-button button"
            >
            <span>Найти</span>
            </button>
            </div>
        <div class="courses-toolbar__add-course button">
             <img class="courses-toolbar__add-cours-icon" src="/assets/images/plus.svg" alt="icon">
              <span>Добавить курс</span>
        </div>
    </div>
    <div class="courses-page__container">
         <ng-container *ngIf="filteredCourses.length > 0; else noData">
            <app-course-card
                *ngFor="let course of filteredCourses; trackBy: trackById"
                [course]="course"
                (edit)="onEditCourse($event)"
                (delete)="onDeleteCourse(course)">
            </app-course-card>
        </ng-container>
        
        <ng-template #noData>
            <div class="courses-page__no-data">
                <div class="courses-page__no-data-image">
                    <img src="/assets/images/ban.svg" alt="Ничего не найдено">
                </div>
                <h4 *ngIf="searchTerm" class="courses-page__no-data-subtitle">
                    Ничего не найдено
                </h4>
                <button (click)="resetFilters()" class="courses-page__reset-button button">
                    Сбросить фильтры
                </button>
            </div>
        </ng-template>
    </div>
    <div *ngIf="filteredCourses.length > 0" class="courses-page__button button" (click)="onLoadMore()">Загрузить еще</div>
</section>
